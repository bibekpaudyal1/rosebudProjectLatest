# ── NOTIFICATION SERVICE ─────────────────────────────────────
# High max replicas — spikes during flash sales
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: bazarbd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 2, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "4009"
        prometheus.io/path:   "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: notification-service
          image: ghcr.io/bazarbd/bazarbd/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4009
          envFrom:
            - configMapRef: { name: bazarbd-config }
            - secretRef:    { name: bazarbd-secrets }
          env:
            - name: PORT
              value: "4009"
          resources:
            requests: { cpu: "50m",  memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 4009 }
            initialDelaySeconds: 20
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: bazarbd
spec:
  selector:
    app: notification-service
  ports:
    - port: 4009
      targetPort: 4009

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: bazarbd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 2
  maxReplicas: 20    # Flash sales can spike to 20x normal notification volume
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }

# ── INGRESS (Nginx Ingress Controller) ───────────────────────
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bazarbd-ingress
  namespace: bazarbd
  annotations:
    kubernetes.io/ingress.class:              nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex:    "true"
    cert-manager.io/cluster-issuer:           letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size:    "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    # Rate limiting at ingress level
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  tls:
    - hosts:
        - bazarbd.com
        - api.bazarbd.com
        - admin.bazarbd.com
        - seller.bazarbd.com
      secretName: bazarbd-tls-cert
  rules:
    - host: api.bazarbd.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway    # Kong
                port:
                  number: 8000

    - host: bazarbd.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000

    - host: admin.bazarbd.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  number: 3001

    - host: seller.bazarbd.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seller
                port:
                  number: 3002