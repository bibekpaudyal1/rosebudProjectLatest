# ============================================================
# .github/workflows/ci.yml
# BazarBD CI Pipeline
# Triggers: push to main, all pull requests
# Jobs: lint → test → build → push (main only)
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/bazarbd

jobs:
  # ── Determine which services changed ──────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      user-service:     ${{ steps.filter.outputs.user-service }}
      auth-service:     ${{ steps.filter.outputs.auth-service }}
      product-service:  ${{ steps.filter.outputs.product-service }}
      order-service:    ${{ steps.filter.outputs.order-service }}
      cart-service:     ${{ steps.filter.outputs.cart-service }}
      payment-service:  ${{ steps.filter.outputs.payment-service }}
      shipping-service: ${{ steps.filter.outputs.shipping-service }}
      inventory-service:${{ steps.filter.outputs.inventory-service }}
      web:              ${{ steps.filter.outputs.web }}
      admin:            ${{ steps.filter.outputs.admin }}
      packages:         ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            user-service:
              - 'services/user-service/**'
              - 'packages/**'
            auth-service:
              - 'services/auth-service/**'
              - 'packages/**'
            product-service:
              - 'services/product-service/**'
              - 'packages/**'
            order-service:
              - 'services/order-service/**'
              - 'packages/**'
            cart-service:
              - 'services/cart-service/**'
              - 'packages/**'
            payment-service:
              - 'services/payment-service/**'
              - 'packages/**'
            shipping-service:
              - 'services/shipping-service/**'
              - 'packages/**'
            inventory-service:
              - 'services/inventory-service/**'
              - 'packages/**'
            web:
              - 'apps/web/**'
              - 'packages/**'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
            packages:
              - 'packages/**'

  # ── Lint and type-check ────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @bazarbd/types run build --if-present

      - name: Lint all packages
        run: pnpm run lint

      - name: Type-check all packages
        run: pnpm run type-check

  # ── Unit and integration tests ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bazarbd_test
          POSTGRES_PASSWORD: test_secret
          POSTGRES_DB: bazarbd_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://bazarbd_test:test_secret@localhost:5432/bazarbd_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test-access-secret-minimum-32-chars-long
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @bazarbd/types run build --if-present

      - name: Run database migrations
        run: |
          PGPASSWORD=test_secret psql -h localhost -U bazarbd_test -d bazarbd_test \
            -f infrastructure/sql/init.sql

      - name: Run tests with coverage
        run: pnpm run test -- --coverage --coverageReporters=json-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | python3 -c "
          import json,sys
          data = json.load(sys.stdin)
          total = data['total']
          lines = total['lines']['pct']
          print(f'Line coverage: {lines}%')
          if lines < 70:
              print('ERROR: Coverage below 70%')
              sys.exit(1)
          ")
          echo "$COVERAGE"

  # ── Docker build + security scan ──────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    strategy:
      matrix:
        service:
          - name: user-service
            port: 4001
          - name: auth-service
            port: 4002
          - name: product-service
            port: 4003
          - name: order-service
            port: 4004
          - name: cart-service
            port: 4005
          - name: payment-service
            port: 4006
          - name: shipping-service
            port: 4007
          - name: inventory-service
            port: 4008

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            SERVICE=${{ matrix.service.name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service.name }}
          platforms: linux/amd64,linux/arm64

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.service.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'     # Don't fail build on findings — report only

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-${{ matrix.service.name }}.sarif
          category: trivy-${{ matrix.service.name }}

    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}

  # ── Build web apps ─────────────────────────────────────────
  build-apps:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    strategy:
      matrix:
        app: [web, admin, seller]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          build-args: APP=${{ matrix.app }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:latest
          cache-from: type=gha,scope=app-${{ matrix.app }}
          cache-to:   type=gha,mode=max,scope=app-${{ matrix.app }}

  # ── PR comment with test results ──────────────────────────
  pr-comment:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.test.result }}' === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI Results ${status}\n\n| Check | Status |\n|-------|--------|\n| Lint | ${{ needs.lint.result == 'success' && '✅ Pass' || '❌ Fail' }} |\n| Tests | ${{ needs.test.result == 'success' && '✅ Pass' || '❌ Fail' }} |\n\nCommit: \`${{ github.sha }}\``
            });